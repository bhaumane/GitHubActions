# Workflow for managing artifacts
# Take reference of main.py and tests.py files for creating artifacts workflow example

name: Artifacts Workflow
on:
  push:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

        # Run tests by taking reference of tests.py file and create an artifact of test results
      - name: Run tests
        run: |
          pytest tests.py --junitxml=test-results.xml


      - name: Create artifact
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.xml