# Workflow for managing artifacts
# Take reference of main.py and tests.py files for creating artifacts workflow example

name: Artifacts Workflow
on:
  push:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          pytest tests/

      - name: Create artifact
        uses: actions/upload-artifact@v2
        with:
          name: test-results