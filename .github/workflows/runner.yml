# Self hosted runner workflow
# A self-hosted runner is a machine that you set up and manage to run GitHub Actions workflows.
# It allows you to run workflows on your own infrastructure, giving you more control over the environment and resources used for your workflows.
# In this example, we will demonstrate how to set up a workflow that runs on a self-hosted runner.

name: Self Hosted Runner Workflow
on:
  workflow_dispatch:
jobs:
  self_hosted_runner_job:
    runs-on: self-hosted
    steps:
      - name: Print a message
        run: echo "This workflow is running on a self-hosted runner!"